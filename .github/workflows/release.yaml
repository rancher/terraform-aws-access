name: release

on:
  push:
    branches:
    - main

env:
  AWS_REGION: us-west-2
  AWS_ROLE: arn:aws:iam::270074865685:role/terraform-module-ci-test
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  ACME_SERVER_URL: https://acme-v02.api.letsencrypt.org/directory

permissions: write-all

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: ghcr.io/rancher/ci-image/nix:20260603-18
      options: --user suse
    permissions:
      contents: write
      issues: write
      pull_requests: write
      workflows: write
    steps:
      - name: 'Release Please'
        # https://github.com/googleapis/release-please-action
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          release-type: terraform-module
      - name: Checkout
        shell: bash
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --tags --force origin
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"
          git fetch origin "+refs/pull/${{ github.event.number }}/merge:refs/remotes/pull/${{ github.event.number }}/merge"
          git checkout "${{ github.sha }}"
      - name: 'Wait for E2E'
        # https://github.com/actions/github-script
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: wait-for-e2e
        if: steps.release-please.outputs.pr
        env:
          PR_NUMBER: ${{ fromJSON(needs.release-please-pr.outputs.pr).number }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const scriptPath = `${process.env.GITHUB_WORKSPACE}/.github/workflows/scripts/wait-for-e2e.js`;
            const { default: script } = await import(scriptPath);
            await script({ github, context, core, process });
      - name: 'Aws Credential Setup'
        id: aws-creds
        # https://github.com/aws-actions/configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        if: steps.release-please.outputs.pr
        with:
          role-to-assume: ${{env.AWS_ROLE}}
          role-session-name: ${{github.run_id}}
          aws-region: ${{env.AWS_REGION}}
          role-duration-seconds: 7200 # 2 hours
          output-credentials: true
      - name: 'Run Tests'
        if: steps.release-please.outputs.pr
        shell: >-
          /home/suse/.nix-profile/bin/nix develop
          --ignore-environment
          --extra-experimental-features nix-command
          --extra-experimental-features flakes
          --keep NIX_SSL_CERT_FILE
          --keep NIX_ENV_LOADED
          --keep TERM
          --keep HOME
          --keep SSH_AUTH_SOCK
          --keep AWS_ACCESS_KEY_ID
          --keep AWS_SECRET_ACCESS_KEY
          --keep AWS_SESSION_TOKEN
          --keep AWS_ROLE
          --keep AWS_REGION
          --keep AWS_DEFAULT_REGION
          --keep GITHUB_TOKEN
          --keep GITHUB_OWNER
          --keep IDENTIFIER
          --keep ZONE
          --keep ACME_SERVER_URL
          --command bash -e {0}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          GITHUB_OWNER: rancher
          IDENTIFIER: ${{github.run_id}}
          ZONE: ${{secrets.ZONE}}
          ACME_SERVER_URL: https://acme-v02.api.letsencrypt.org/directory
        run: |
          ./run_tests.sh
      - name: 'Report Results'
        # https://github.com/actions/github-script
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        if: steps.release-please.outputs.pr
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ fromJson(steps.release-please.outputs.pr).number }},
              owner: "${{ github.repository_owner }}",
              repo: "${{ github.event.repository.name }}",
              body: "End to End Tests Passed! \n ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            })
